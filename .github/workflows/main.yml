name: CI

on:
  push:
    branches: [ "master" ]

jobs:
  build_iOS:
    name: Build for iOS
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: "master"
          submodules: recursive

      # Flutter のインストール
      - name: Install Flutter
        run: git clone https://github.com/flutter/flutter.git # ターミナルでこれが実行されるイメージ

      # PATH を通す
      - name: Add path
        run: echo "$(pwd)/flutter/bin" >> $GITHUB_PATH # GITHUB_PATH にどんどんぶちこめばいいらしい

      # パッケージのダウンロード
      - name: Download Flutter dependencies packages
        run: flutter pub get

      # ビルド
      - name: Build
        run: flutter build ios --no-codesign --release

      # ipaのパッケージング
      - name: Create ipa
        run: |
          mkdir -p Payload
          cp -r build/ios/iphoneos/Runner.app Payload/
          zip -r FluxerLite.ipa Payload

      # Artifactへのアップロード
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: IPA Package
          path: FluxerLite.ipa

# https://zenn.dev/pressedkonbu/articles/254ca2fc3cd1ab を参考に
